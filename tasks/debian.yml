---
- name: debian | Download Apt keys
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.keyring | replace('.gpg', '.asc') }}"
    mode: "0644"
  loop: "{{ _apt_key }}"
  register: result
  until: result is succeeded

- name: debian | Apt-add-repository
  ansible.builtin.apt_repository:
    filename: "{{ item.filename }}"
    repo: "{{ item.repo }}"
    state: "{{ item.state }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ _apt_repository }}"
  register: result
  until: result is succeeded

- name: debian | Apt-get install
  ansible.builtin.apt:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
  loop: "{{ _apt }}"
  register: result
  until: result is succeeded
